<body>

  <!-- ======= Encabezado ======= -->
  <header id="header" class="header-fixed header-dashboard">
    <div class="container d-flex justify-content-between align-items-center dashboard-header-container">
      <div id="logo">
        <a href="index.html"><img src="assets/img/logo.png" alt="" class="dashboard-logo-img"></a>
      </div>

      <nav id="nav-menu-container">
        <ul class="nav-menu nav-menu-dashboard">
          <li><a href="#" id="btnCerrarSesion" class="btn-cerrar-sesion">Cerrar Sesión</a></li>
        </ul>
      </nav>
    </div>
  </header><!-- End Header -->

  <main id="main">

    <!-- ======= DASHBOARD CLIENTES ======= -->

    <section id="team" class="dashboard-section">
      <div class="container" data-aos="fade-up">

        <div class="section-header">
          <h3 class="section-title dashboard-section-title">Bienvenida/o, <span id="dashName"></span></h3>
          <p class="section-description dashboard-section-description">
            Este es tu espacio personal.
          </p>
        </div>

        <!-- Fila que distribuye las 4 tarjetas (botones) -->
        <div class="row align-items-stretch">

          <!-- Boton 1: MIS DATOS -->
          <div class="col-lg-3 col-md-6 mb-4">
            <a href="#" class="btn-dashboard w-100" id="btnDash1" data-aos="fade-up" data-aos-delay="100">
              <div class="datos-cliente text-center w-100 d-none" id="contDatos">

                <!-- Avatar Circular -->
                <div class="avatar-container">
                  <div class="circle-avatar dashboard-circle-avatar">
                    <i class="fa fa-camera avatar-icon" id="avatarIcon"></i>
                    <img id="avatarImage" class="avatar-image" src="">
                    <input type="file" id="avatarInput" class="avatar-input" accept="image/*" title="Cargar Avatar">
                  </div>
                </div>

                <!-- TARJETA DE DATOS PERSONALES-->
                <p><strong id="lblNombre" class="lbl-nombre-apellido"></strong> <strong id="lblApellido" class="lbl-nombre-apellido"></strong></p>
                <p><span id="lblEmail" class="lbl-email"></span></p>

                <!-- WApp con el logo en el piso superior -->
                <p class="wapp-container"><i class="fa fa-whatsapp wapp-icon"></i></p>
                <p><span id="lblWapp" class="lbl-wapp"></span></p>
              </div>
            </a>
          </div>

          <!-- Boton 2: PROXIMOS EVENTOS -->
          <div class="col-lg-3 col-md-6 mb-4">
            <a href="#" class="btn-dashboard w-100" id="btnDash2" data-aos="fade-up" data-aos-delay="200">
              <h4>Proximos<br>Eventos</h4>
              <p class="transition-p">Enterate de nuestras próximas
                novedades.</p>
            </a>
          </div>

          <!-- Boton 3: MIS COMPRAS Y RESERVAS -->
          <div class="col-lg-3 col-md-6 mb-4">
            <a href="#" class="btn-dashboard w-100" id="btnDash3" data-aos="fade-up" data-aos-delay="300">
              <h4>Mis Compras<br>y Reservas</h4>
              <p class="transition-p">Explora tu historial con
                nosotros.</p>
            </a>
          </div>

          <!-- Boton 4: QUIERO SER PARTE -->
          <div class="col-lg-3 col-md-6 mb-4">
            <a href="#" class="btn-dashboard w-100" id="btnDash4" data-aos="fade-up" data-aos-delay="400">
              <h4>Quiero<br>Ser Parte</h4>
              <p class="transition-p">Unite a nuestra prestigiosa
                comunidad.</p>
            </a>
          </div>

        </div>

      </div>
    </section>

  </main>

  <!-- ======= PIE DE PAGINA ======= -->
  <footer id="footer" class="footer-dashboard">
    <div class="container footer-container">
      <div class="copyright text-center footer-copyright">
        &copy; Copyright <strong>MiriamSchild® </strong>2025
      </div>
      <div class="credits">
        designed by <a href="">jA Comunicacion</a>
      </div>
    </div>
  </footer>

  <!-- Miriam JS Files -->
  <script src="assets/miriam/jquery/jquery.min.js"></script>
  <script src="assets/miriam/bootstrap/js/bootstrap.bundle.min.js"></script>
  <!-- Animaciones -->
  <script src="assets/miriam/aos/aos.js"></script>

  <!-- Template Main JS File -->
  <script src="assets/js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Inicializar animaciones
      if (typeof AOS !== 'undefined') {
        AOS.init();
      }

      // Verificar usuario en BD local
      const datosStr = localStorage.getItem('clienteDatosWeb');
      if (datosStr) {
        // Cargar datos en dashboard
        const datos = JSON.parse(datosStr);
        document.getElementById('dashName').textContent = datos.name || 'Cliente';
        document.getElementById('lblNombre').textContent = datos.name || '';
        document.getElementById('lblApellido').textContent = datos.surname || '';
        document.getElementById('lblEmail').textContent = datos.email || '';
        document.getElementById('lblWapp').textContent = datos.whatsapp || '';

        document.getElementById('contDatos').classList.remove('d-none');

        // Cargar avatar si existe en formato base64
        const savedAvatar = localStorage.getItem('clienteAvatar');
        if (savedAvatar) {
          document.getElementById('avatarImage').src = savedAvatar;
          document.getElementById('avatarImage').style.display = 'block';
          document.getElementById('avatarIcon').style.display = 'none';
        }
      } else {
        // Redirigir al index para evitar accesos vacios
        window.location.href = 'index.html';
      }

      // Logica para Salir
      document.getElementById('btnCerrarSesion').addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = 'index.html';
      });

      // Lógica de subida de avatar
      const avatarInput = document.getElementById('avatarInput');
      avatarInput.addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (event) {
            const base64Img = event.target.result;
            // Guardar localmente
            localStorage.setItem('clienteAvatar', base64Img);
            // Mostrar imagen
            document.getElementById('avatarImage').src = base64Img;
            document.getElementById('avatarImage').style.display = 'block';
            document.getElementById('avatarIcon').style.display = 'none';
          };
          reader.readAsDataURL(file);
        }
      });
    });
  </script>

</body>

</html>
