name: 🚀 Deploy a DonWeb (FTP)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚚 Sync Files
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 🚀 Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_SENIA }}
          # Excluimos carpetas que no van al servidor web directo
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            backend/**
            .vscode/**
